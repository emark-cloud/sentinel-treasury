[package]
name = "sentinel-contracts"
version = "0.1.0"
edition = "2021"
description = "Sentinel Treasury on-chain layer: SentinelVault + AuditLog (Odra, upgradable)"

[dependencies]
odra = { version = "2.8.0", features = [], default-features = false }

[dev-dependencies]
odra-test = { version = "2.8.0", features = [], default-features = false }

[build-dependencies]
odra-build = { version = "2.8.0", features = [], default-features = false }

# Host-side (non-wasm) build/deploy helpers. `odra-casper-livenet-env` powers the Testnet deploy
# bin and is optional — only pulled in under the `livenet` feature.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
odra-build = { version = "2.8.0", features = [], default-features = false }
odra-casper-livenet-env = { version = "2.8.0", optional = true }
# Surfaces the underlying RPC/deploy error that odra's livenet env logs via `log::error!`
# (otherwise masked behind a generic ContractDeploymentError). Only pulled in for the deploy bin.
env_logger = { version = "0.10", optional = true }

# cargo-odra resolves the build bins by the `<crate>_build_{contract,schema}` naming convention.
[[bin]]
name = "sentinel_contracts_build_contract"
path = "bin/build_contract.rs"
test = false

[[bin]]
name = "sentinel_contracts_build_schema"
path = "bin/build_schema.rs"
test = false

[[bin]]
name = "livenet_deploy"
path = "bin/livenet_deploy.rs"
required-features = ["livenet"]
test = false

[lib]
doctest = false

[features]
default = []
# Pulls in the Casper Livenet host env for the Testnet deploy bin (`bin/livenet_deploy.rs`).
livenet = ["dep:odra-casper-livenet-env", "dep:env_logger"]

[profile.release]
codegen-units = 1
lto = true

[profile.dev.package."*"]
opt-level = 3
